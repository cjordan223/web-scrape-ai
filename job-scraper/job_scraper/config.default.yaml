# Watchers — source-agnostic job discovery plugins.
# Types: crawl, rss, api, custom. Each watcher can skip specific filter stages.
# Examples:
#
# watchers:
#   - name: nasa-careers
#     type: crawl
#     url: "https://www.usajobs.gov/Search/Results?k=software+engineer&l=Remote"
#     link_pattern: "/job/\\d+"
#     skip_filters: [title_relevance, title_role, source_quality]
#     tags: [space]
#
#   - name: usajobs-api
#     type: api
#     url: "https://data.usajobs.gov/api/Search"
#     headers:
#       Authorization-Key: "${USAJOBS_API_KEY}"
#       User-Agent: "connercharlesjordan@gmail.com"
#     params:
#       Keyword: "security engineer"
#       LocationName: "Remote"
#     results_path: "SearchResult.SearchResultItems"
#     title_field: "MatchedObjectDescriptor.PositionTitle"
#     url_field: "MatchedObjectDescriptor.PositionURI"
#     snippet_field: "MatchedObjectDescriptor.UserArea.Details.MajorDuties.0"
#     skip_filters: [title_relevance, source_quality]
#     tags: [space, government]
#
#   - name: planet-careers
#     type: rss
#     url: "https://www.planet.com/careers/feed/"
#     skip_filters: [title_relevance, title_role]
#     tags: [space, environmental]
#
#   - name: nasa-custom
#     type: custom
#     module: job_scraper.watchers_nasa
#     skip_filters: [title_relevance, title_role, source_quality]
#     tags: [space]
watchers:
  - name: usajobs
    type: custom
    module: job_scraper.usajobs
    board: usajobs
    enabled: true
    skip_filters:
      - url_domain
      - source_quality
      - remote
      - location
    params:
      series: "2210;1550;0854;0861;1560;1301"
      keywords: "cybersecurity;software engineer;platform engineer;cloud security;DevSecOps;aerospace engineer"
      agencies: "NN;EP;NS"   # NASA, EPA, NSF
      days: "14"
      remote: "true"

