  - collinsdictionary.com
  - techtarget.com
  - wikipedia.org
  - merriam-webster.com
  - investopedia.com
  - reddit.com
  - quora.com
  - youtube.com
  - medium.com
  - usajobs.gov
  - novaedge.page.gd
  - hireza.wuaze.com
  - jaabz.com
  - virtualvocations.com
  - aijobs.com
  - join.com
  - jobgether.com
  - jobright.ai
  require_remote: true
  require_explicit_remote: false
  require_us_location: true
  allow_canada: false
  require_known_board: false
  min_jd_chars: 50
  jd_max_chars: 15000
  score_accept_threshold: 0
  score_reject_threshold: -3
  target_min_results: 5
  target_max_results: 50
  seen_ttl_days: 14
  promotion_min_score: 0
pipeline_order:
- text_extraction
- dedup
- hard_filter
- llm_relevance
- storage
